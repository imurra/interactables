<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pressure–Volume Loop Simulator</title>
<style>
  * { box-sizing: border-box; }
  body {
    background: #0D1117;
    color: #C9D1D9;
    min-height: 100vh;
    font-family: 'JetBrains Mono','SF Mono','Fira Code',monospace;
    padding: 8px 8px 20px;
    margin: 0;
  }
  #wrap { max-width: 580px; margin: 0 auto; }
  h1 { font-size:15px; font-weight:700; color:#E6EDF3; margin:0; letter-spacing:1.5px; text-transform:uppercase; text-align:center; }
  .sub { font-size:9px; color:#484F58; margin-top:2px; text-align:center; margin-bottom:8px; }
  .group-row { display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
  .group-label { font-size:8px; color:#484F58; width:62px; text-align:right; flex-shrink:0; text-transform:uppercase; letter-spacing:0.5px; }
  .sc-btn { padding:3px 9px; font-size:10px; font-weight:400; background:transparent; color:#6E7681; border:1px solid #21262D; border-radius:3px; cursor:pointer; font-family:inherit; transition:all .15s; }
  .sc-btn.on { font-weight:700; }
  .svg-box { background:#0D1117; border:1px solid #21262D; border-radius:6px; padding:4px; position:relative; }
  svg { width:100%; height:auto; display:block; }
  .phase-note { position:absolute; top:8px; right:10px; font-size:8px; color:#30363D; line-height:1.6; }
  .sliders { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin:4px 0; padding:8px; background:#161B22; border-radius:4px; border:1px solid #21262D; }
  .slider-label { font-size:8px; color:#8B949E; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .slider-val { font-size:10px; color:#E6EDF3; font-weight:600; text-align:center; }
  input[type=range] { width:100%; height:4px; }
  .steps-panel { background:#161B22; border:1px solid #21262D; border-radius:4px; padding:10px 12px; margin-top:6px; }
  .steps-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .steps-title { font-size:12px; font-weight:700; }
  .steps-nav { display:flex; align-items:center; gap:6px; }
  .nav-btn { padding:2px 10px; font-size:11px; font-weight:600; border-radius:3px; font-family:inherit; cursor:pointer; }
  .nav-btn.disabled { cursor:default; }
  .step-count { font-size:10px; color:#6E7681; min-width:32px; text-align:center; }
  .progress-row { display:flex; gap:4px; margin-bottom:8px; }
  .progress-seg { flex:1; height:3px; border-radius:2px; cursor:pointer; background:#21262D; transition:background .2s; }
  .step-title { font-size:12px; font-weight:700; color:#E6EDF3; margin-bottom:4px; }
  .step-text { font-size:11px; color:#8B949E; line-height:1.7; min-height:48px; }
  .manual-panel { background:#161B22; border:1px solid #21262D; border-radius:4px; padding:8px 12px; margin-top:6px; font-size:10px; color:#6E7681; line-height:1.6; }
  .footer { font-size:7px; color:#21262D; text-align:center; margin-top:8px; }
</style>
</head>
<body>
<div id="wrap">
  <h1>Pressure–Volume Loop</h1>
  <div class="sub">ESPVR &amp; EDPVR control the boundaries · The loop is emergent</div>
  <div id="groups" style="display:flex; flex-direction:column; gap:3px; margin-bottom:8px;"></div>
  <div class="svg-box">
    <svg id="svgChart" viewBox="0 0 540 420"></svg>
    <div class="phase-note">
      <div>a = filling · b = isovolum. contraction</div>
      <div>c = ejection · d = isovolum. relaxation</div>
    </div>
  </div>
  <div class="sliders" id="sliders"></div>
  <div id="stepsPanel"></div>
  <div id="manualPanel"></div>
  <div class="footer">Dr. Ian Murray · CC BY-NC-SA · Sagawa/Suga · CVPhysiology cf025/cf026</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// PRESSURE–VOLUME LOOP SIMULATOR v4 — standalone HTML port
// Ported 1:1 from the React source (same math, same scenarios, same UI logic)
// ═══════════════════════════════════════════════════════════════════

const V0 = 10, A_ED = 0.5, REF_ALPHA = 0.02;

function getEffectiveEDV(sliderEDV, alpha) {
  if (Math.abs(alpha - REF_ALPHA) < 0.001) return sliderEDV;
  const refLVEDP = A_ED * (Math.exp(REF_ALPHA * sliderEDV) - 1);
  if (alpha <= 0.001) return Math.min(sliderEDV * 1.3, 220);
  const edv = Math.log(refLVEDP / A_ED + 1) / alpha;
  return Math.max(50, Math.min(edv, 220));
}

function computeState(Ees, EDV, Ea, alpha) {
  const ESV = (Ea * EDV + Ees * V0) / (Ees + Ea);
  const ESP = Ees * (ESV - V0);
  const SV = EDV - ESV;
  const EF = (SV / EDV) * 100;
  const LVEDP = A_ED * (Math.exp(alpha * EDV) - 1);
  const esvP0 = A_ED * (Math.exp(alpha * ESV) - 1);
  return { EDV, ESV, ESP, SV, EF, LVEDP, esvP0 };
}

function edpvr(V, alpha) { return A_ED * (Math.exp(alpha * V) - 1); }
function espvr(V, Ees) { return Ees * (V - V0); }

// ─── SCENARIOS ───
const SC = {
  normal: { label:"Normal", Ees:2.5, EDV:120, Ea:2.0, alpha:0.02, color:"#58A6FF", highlight:null, steps:[
    { title:"Baseline", text:"A healthy left ventricle. Two boundary curves control the loop: ESPVR (contractility ceiling) and EDPVR (passive compliance floor). The loop shape emerges from these constraints." },
    { title:"Filling (phase a)", text:"Mitral valve opens → blood flows from left atrium into the ventricle along the EDPVR. Volume rises gently because the normal wall is compliant — filling is easy and pressure stays low." },
    { title:"Systole (b → c → d)", text:"Phase b: all valves closed, pressure builds. Phase c: aortic valve opens, blood is ejected. The top-left corner sits on the ESPVR — the maximum the ventricle can squeeze at that volume. Phase d: pressure falls back down." },
    { title:"Sliding vs. rotating", text:"Preload changes SLIDE the loop along a fixed ESPVR. Contractility changes ROTATE the ESPVR itself. Both can increase Stroke Volume (SV), but through fundamentally different mechanisms. Try the sliders to see this." }
  ]},
  hfref: { label:"HFrEF", Ees:1.0, EDV:180, Ea:2.2, alpha:0.02, color:"#F85149", highlight:"topleft", steps:[
    { title:"The heart muscle weakens", text:"In dilated cardiomyopathy or after a large MI, the ventricle loses contractile force. The ESPVR flattens — the ceiling drops. The ventricle simply cannot squeeze as hard." },
    { title:"Can't empty → volume backs up", text:"Because the ventricle can't empty properly, blood accumulates. The body retains fluid (RAAS activation), pushing the loop rightward. The ventricle dilates." },
    { title:"Filling pressures rise → congestion", text:"More volume in the ventricle means higher diastolic pressure (LVEDP rises). This backs up into the lungs → pulmonary congestion → dyspnea. The Starling mechanism partially compensates Stroke Volume (SV), but at the cost of congestion." },
    { title:"Ejection Fraction (EF) drops", text:"EF falls to ~30%. The loop is wide but flat — lots of volume, poor emptying. Treatment targets: reduce preload (diuretics), reduce afterload (ACE inhibitors), and if possible support contractility." }
  ]},
  hfpef: { label:"HFpEF", Ees:2.5, EDV:112, Ea:2.0, alpha:0.033, color:"#F0883E", highlight:"bottomright", steps:[
    { title:"The wall stiffens", text:"In hypertensive heart disease, aging, or amyloid, the ventricular wall becomes stiff. Think of inflating a stiff balloon — it takes much more pressure to fill the same volume. The EDPVR curve shifts upward." },
    { title:"Filling pressure rises despite less volume", text:"Even though the ventricle fills to a SMALLER volume, diastolic pressure (LVEDP) is much higher. The bottom of the loop rises. This is the opposite of HFrEF — the ventricle is small and stiff, not big and floppy." },
    { title:"Same symptoms, different mechanism", text:"High LVEDP backs up into the lungs → pulmonary congestion → dyspnea. The patient looks identical to HFrEF clinically — but the cause is impaired filling, not impaired contraction." },
    { title:"The diagnostic trap", text:"Ejection Fraction (EF) is preserved (>50%) — the ventricle empties fine, it just can't fill. Echo shows 'normal EF' but diastolic dysfunction (elevated E/e'). This is why HFpEF was historically missed." }
  ]},
  as: { label:"Aortic Stenosis", Ees:2.5, EDV:130, Ea:3.5, alpha:0.02, color:"#A371F7", highlight:"topright", steps:[
    { title:"Fixed obstruction to outflow", text:"A stenotic aortic valve creates a barrier to ejection. The ventricle must generate much higher pressure (afterload/ESP) to push blood through the narrowed opening. The loop grows taller." },
    { title:"Pressure overload → hypertrophy", text:"The ventricle compensates by thickening its walls (concentric hypertrophy) to generate the higher pressures needed. The loop becomes tall and narrow — high afterload (ESP), reduced Stroke Volume (SV)." },
    { title:"High energy cost", text:"A tall, narrow loop means enormous myocardial oxygen demand. The thick wall also has poor subendocardial perfusion → patients develop angina even without coronary artery disease." },
    { title:"Decompensation", text:"Initially Stroke Volume (SV) and Ejection Fraction (EF) are maintained through hypertrophy. But eventually the muscle can't keep up → contractility falls → EF drops → rapid clinical deterioration." }
  ]},
  ar: { label:"Aortic Regurg", Ees:2.5, EDV:180, Ea:1.5, alpha:0.018, color:"#D2A8FF", highlight:"topleft", steps:[
    { title:"Backward leak during diastole", text:"An incompetent aortic valve lets blood leak backward from the aorta into the ventricle during diastole. The LV fills from TWO sources — the left atrium AND the aorta — so it overfills dramatically." },
    { title:"Volume overload widens the loop", text:"The ventricle dilates to accommodate the extra volume. The loop shifts right and becomes wide. Total Stroke Volume (SV) is very large, but some of it just leaks backward — forward SV to the body is reduced." },
    { title:"Eccentric remodeling", text:"Chronic volume overload causes the ventricle to remodel — it stretches (sarcomeres added in series). The chamber gets bigger but compliance may actually improve initially, keeping filling pressures manageable." },
    { title:"Progressive failure", text:"Over time, the chronic dilation increases wall stress → contractility eventually drops → the ESPVR flattens → Ejection Fraction (EF) falls. By the time EF drops, significant irreversible damage has occurred." }
  ]},
  ms: { label:"Mitral Stenosis", Ees:2.5, EDV:90, Ea:2.0, alpha:0.02, color:"#79C0FF", highlight:"bottomright", steps:[
    { title:"Restricted filling", text:"A stenotic mitral valve limits blood flow from the left atrium into the ventricle. The ventricle receives less blood per beat → it underfills. The loop shrinks and shifts left." },
    { title:"The ventricle itself is normal", text:"Contractility is fine, compliance is fine — the problem is upstream. The ventricle just doesn't get enough blood to work with. Stroke Volume (SV) drops because there's less to eject." },
    { title:"LVEDP is LOW — key point", text:"Unlike most causes of pulmonary congestion, the LV filling pressure is actually low. The ventricle is starved of volume, not overloaded. This distinguishes MS from heart failure on the PV loop." },
    { title:"LA pressure drives the congestion", text:"The pathology is in the left atrium — LA pressure must be very high to force blood through the stenotic valve. LA dilates → atrial fibrillation. Pulmonary congestion comes from LA hypertension, not LV dysfunction." }
  ]},
  mr: { label:"Mitral Regurg", Ees:2.5, EDV:160, Ea:0.8, alpha:0.02, color:"#3FB950", highlight:"topleft", steps:[
    { title:"Backward leak during systole", text:"An incompetent mitral valve lets blood regurgitate from the ventricle back into the left atrium during contraction. This creates a low-resistance escape route — the ventricle can empty more easily." },
    { title:"Afterload (ESP) drops", text:"Because part of the ejection goes into the low-pressure LA, the effective afterload is reduced. The ventricle doesn't have to generate as much pressure to empty. The top of the loop drops." },
    { title:"Volume overload from regurgitant return", text:"The leaked blood returns from the LA next beat, increasing filling volume. The loop shifts right and widens. Total Stroke Volume (SV) is high, but forward SV is reduced." },
    { title:"The Ejection Fraction (EF) trap", text:"EF appears supranormal (>60%) because of the low-resistance unloading. But this is misleading — in severe MR, an EF of 60% actually indicates the ventricle is already failing. Guidelines trigger surgery at EF <60%." }
  ]},
  hemorrhage: { label:"Hemorrhage", Ees:2.5, EDV:85, Ea:2.5, alpha:0.02, color:"#D29922", highlight:"bottomright", steps:[
    { title:"Acute blood loss", text:"Blood loss reduces circulating volume → less venous return → the ventricle fills less. The loop slides left and shrinks. This is primarily a preload problem." },
    { title:"Sympathetic compensation kicks in", text:"Baroreceptors detect falling pressure → sympathetic activation → heart rate increases, contractility improves slightly, and peripheral vessels constrict to maintain blood pressure." },
    { title:"Smaller loop, lower Stroke Volume (SV)", text:"Despite compensation, SV drops significantly. The loop is small and shifted left. The ventricle is working fine — it just doesn't have enough blood to pump." },
    { title:"Tachycardia is the early sign", text:"Cardiac output = SV × heart rate. With reduced SV, heart rate must rise to maintain output. Tachycardia appears BEFORE hypotension — by the time blood pressure drops, >30% of blood volume is lost." }
  ]},
  fluid: { label:"IV Fluid", Ees:2.5, EDV:150, Ea:2.0, alpha:0.02, color:"#1F6FEB", highlight:"bottomright", steps:[
    { title:"Volume expansion", text:"IV fluid increases circulating volume → more venous return → the ventricle fills more. The loop slides right along the same ESPVR. Contractility and afterload don't change — this is a pure preload effect." },
    { title:"Starling mechanism increases SV", text:"Greater filling stretch → more forceful contraction → Stroke Volume (SV) increases. The loop gets wider. The right side shifts right while the left side barely moves." },
    { title:"Preload vs. inotropy distinction", text:"Compare with inotropes: fluid shifts the RIGHT side of the loop (more filling). Inotropes shift the LEFT side (better emptying). Both increase SV, but by moving opposite sides of the loop." },
    { title:"Fluid responsiveness has limits", text:"On the steep part of the compliance curve, fluid helps. But past a certain point, more fluid just raises filling pressure without increasing SV → pulmonary edema. This is why passive leg raise and SVV testing matter." }
  ]},
  inotrope: { label:"Inotrope", Ees:4.0, EDV:120, Ea:2.0, alpha:0.02, color:"#BC8CFF", highlight:"topleft", steps:[
    { title:"Contractility increases", text:"Dobutamine (β1 agonist) strengthens contraction. The ESPVR rotates upward — the contractile ceiling rises. The ventricle can now squeeze more completely at any given volume." },
    { title:"Better emptying → wider loop", text:"The ventricle empties more completely → the left side of the loop shifts left. Filling volume stays roughly the same. Stroke Volume (SV) increases because the loop gets WIDER, not just shifted." },
    { title:"Compare: preload vs. contractility", text:"IV Fluid: right side shifts right (more filling), left side stays → wider. Inotrope: left side shifts left (better emptying), right side stays → wider. Both increase SV by moving OPPOSITE sides of the loop." },
    { title:"Clinical tradeoff", text:"Ejection Fraction (EF) improves. But inotropes increase myocardial oxygen demand and arrhythmia risk. They're a bridge — to surgery, recovery, or a ventricular assist device — not a long-term solution." }
  ]}
};

const NORM = SC.normal;
const normSt = computeState(NORM.Ees, NORM.EDV, NORM.Ea, NORM.alpha);

// ─── SVG geometry ───
const W = 540, H = 420;
const PD = { t:22, r:22, b:52, l:56 };
const GW = W - PD.l - PD.r, GH = H - PD.t - PD.b;
const VMAX = 220, PMAX = 240;

function vX(v) { return PD.l + (v / VMAX) * GW; }
function pY(p) { return PD.t + GH - (Math.max(0, Math.min(p, PMAX)) / PMAX) * GH; }

function makeLoop(st, Ees, alpha) {
  const { EDV, ESV, ESP, LVEDP, esvP0 } = st;
  const pts = [];
  for (let i = 0; i <= 20; i++) {
    const v = ESV + (EDV - ESV) * (i / 20);
    const p = edpvr(v, alpha);
    pts.push([v, p]);
  }
  for (let i = 0; i <= 12; i++) {
    const f = i / 12;
    const p = LVEDP + (ESP - LVEDP) * f;
    pts.push([EDV, p]);
  }
  for (let i = 0; i <= 20; i++) {
    const f = i / 20;
    const v = EDV - (EDV - ESV) * f;
    const straightP = ESP;
    const peakBow = 8;
    const bow = peakBow * Math.sin(f * Math.PI);
    const espvrAtV = espvr(v, Ees);
    const p = Math.min(straightP + bow, espvrAtV + 5);
    pts.push([v, Math.max(p, ESP - 15)]);
  }
  for (let i = 0; i <= 12; i++) {
    const f = i / 12;
    const p = ESP - (ESP - esvP0) * f;
    pts.push([ESV, p]);
  }
  return pts.map(([v, p]) => `${vX(v).toFixed(1)},${pY(p).toFixed(1)}`).join(" ");
}

function makeCurve(type, param) {
  const pts = [];
  for (let v = (type === "espvr" ? V0 : 0); v <= 210; v += 2) {
    const p = type === "espvr" ? espvr(v, param) : edpvr(v, param);
    if (p > PMAX + 10) break;
    if (type === "edpvr" && p > 65) break;
    pts.push(`${vX(v).toFixed(1)},${pY(p).toFixed(1)}`);
  }
  return pts.join(" ");
}

function getHL(key, pv) {
  if (!key) return null;
  const m = {
    topleft: { cx: vX(pv.ESV), cy: pY(pv.ESP), label: "End-systolic point" },
    bottomright: { cx: vX(pv.EDV), cy: pY(pv.LVEDP), label: "Preload (EDV)" },
    topright: { cx: vX(pv.EDV), cy: pY(pv.ESP), label: "Peak pressure" }
  };
  return m[key] || null;
}

// ═══════════ STATE ═══════════
let scKey = "normal";
let step = 0;
let mode = "scenario";
let sl = { Ees: 2.5, EDV: 120, Ea: 2.0, alpha: 0.02, _last: null };

function computePV() {
  const sc = SC[scKey];
  if (mode === "scenario") return computeState(sc.Ees, sc.EDV, sc.Ea, sc.alpha);

  if (sl._last === "Ea") return computeState(sl.Ees, sl.EDV, sl.Ea, sl.alpha);

  if (sl._last === "alpha") {
    const effEDV = getEffectiveEDV(sl.EDV, sl.alpha);
    const refESP = normSt.ESP;
    const maxEDV = sl.alpha > 0.001 ? Math.log(refESP / A_ED + 1) / sl.alpha : effEDV;
    const clampedEDV = Math.min(effEDV, maxEDV);
    const ESP = Math.min(refESP, sl.Ees * (clampedEDV - V0));
    const ESV = Math.max(V0 + 1, Math.min(ESP / sl.Ees + V0, clampedEDV - 1));
    const SV = clampedEDV - ESV;
    const EF = (SV / clampedEDV) * 100;
    const LVEDP = A_ED * (Math.exp(sl.alpha * clampedEDV) - 1);
    const esvP0 = A_ED * (Math.exp(sl.alpha * ESV) - 1);
    return { EDV: clampedEDV, ESV, ESP, SV, EF, LVEDP, esvP0 };
  }

  if (sl._last === "EDV") {
    const trial = computeState(sl.Ees, sl.EDV, sl.Ea, sl.alpha);
    if (trial.LVEDP < trial.ESP) return trial;
    const maxEDV = sl.alpha > 0.001 ? Math.log(trial.ESP / A_ED + 1) / sl.alpha : sl.EDV;
    return computeState(sl.Ees, Math.min(sl.EDV, maxEDV), sl.Ea, sl.alpha);
  }

  // Ees slider (or default/_last === "Ees")
  const refESP = normSt.ESP;
  const maxEDV = sl.alpha > 0.001 ? Math.log(refESP / A_ED + 1) / sl.alpha : sl.EDV;
  const EDV = Math.min(sl.EDV, maxEDV);
  const ESP = Math.min(refESP, sl.Ees * (EDV - V0));
  const ESV = Math.max(V0 + 1, Math.min(ESP / sl.Ees + V0, EDV - 1));
  const SV = EDV - ESV;
  const EF = (SV / EDV) * 100;
  const LVEDP = A_ED * (Math.exp(sl.alpha * EDV) - 1);
  const esvP0 = A_ED * (Math.exp(sl.alpha * ESV) - 1);
  return { EDV, ESV, ESP, SV, EF, LVEDP, esvP0 };
}

function pickSc(k) {
  scKey = k;
  step = 0;
  mode = "scenario";
  render();
}

function slide(k, v) {
  if (mode === "scenario") {
    const snap = SC[scKey];
    sl = { Ees: snap.Ees, EDV: snap.EDV, Ea: snap.Ea, alpha: snap.alpha, _last: k };
    sl[k] = v;
  } else {
    sl = { ...sl, _last: k };
    sl[k] = v;
  }
  mode = "manual";
  render();
}

const vTicks = [0, 50, 100, 150, 200];
const pTicks = [0, 50, 100, 150, 200];
const groups = [
  { label: "Conditions", keys: ["normal", "hfref", "hfpef"] },
  { label: "Valvular", keys: ["as", "ar", "ms", "mr"] },
  { label: "Acute", keys: ["hemorrhage", "fluid", "inotrope"] }
];

function renderGroups() {
  const el = document.getElementById("groups");
  el.innerHTML = groups.map(g => `
    <div class="group-row">
      <span class="group-label">${g.label}</span>
      ${g.keys.map(k => {
        const s = SC[k];
        const on = scKey === k && mode === "scenario";
        return `<button class="sc-btn${on ? ' on' : ''}" data-sc="${k}"
          style="background:${on ? s.color + '20' : 'transparent'}; color:${on ? s.color : '#6E7681'}; border:1px solid ${on ? s.color + '55' : '#21262D'};">
          ${s.label}</button>`;
      }).join("")}
    </div>
  `).join("");
  el.querySelectorAll("[data-sc]").forEach(btn => {
    btn.addEventListener("click", () => pickSc(btn.dataset.sc));
  });
}

function renderSVG(pv, pm, col, showRef, hl) {
  const loop = makeLoop(pv, pm.Ees, pm.alpha);
  const nLoop = makeLoop(normSt, NORM.Ees, NORM.alpha);
  const espL = makeCurve("espvr", pm.Ees);
  const edpL = makeCurve("edpvr", pm.alpha);
  const nEspL = makeCurve("espvr", NORM.Ees);
  const nEdpL = makeCurve("edpvr", NORM.alpha);

  let espLabel = "";
  {
    const lv = V0 + Math.min(90 / pm.Ees, 45), lp = espvr(lv, pm.Ees);
    if (lp > 10 && lp < PMAX - 20) {
      espLabel = `<text x="${vX(lv)+3}" y="${pY(lp)-5}" fill="${col}" font-size="9" opacity="0.6" font-weight="600">ESPVR</text>`;
    }
  }
  let edpLabel = "";
  {
    let v2 = 170, p2 = edpvr(v2, pm.alpha);
    if (p2 > 50) { v2 = 140; p2 = edpvr(v2, pm.alpha); }
    if (p2 > 50) { v2 = 110; p2 = edpvr(v2, pm.alpha); }
    if (p2 > 1 && p2 < 60) {
      edpLabel = `<text x="${vX(v2)+3}" y="${pY(p2)-5}" fill="${col}" font-size="9" opacity="0.6" font-weight="600">EDPVR</text>`;
    }
  }

  const refBlock = showRef ? `
    <polyline points="${nEspL}" fill="none" stroke="#8B949E" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.5"/>
    <polyline points="${nEdpL}" fill="none" stroke="#8B949E" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.5"/>
    <polygon points="${nLoop}" fill="#8B949E" fill-opacity="0.06" stroke="#8B949E" stroke-width="1.8" stroke-dasharray="4,3" opacity="0.55"/>
    <text x="${vX(normSt.EDV)+5}" y="${pY(normSt.ESP)+14}" fill="#8B949E" font-size="10" font-weight="600" opacity="0.7">Normal</text>
  ` : "";

  const hlBlock = hl ? `
    <circle cx="${hl.cx}" cy="${hl.cy}" r="14" fill="none" stroke="#E3B341" stroke-width="2.5" opacity="0.85">
      <animate attributeName="r" values="12;16;12" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="${hl.cx}" y="${hl.cy-20}" fill="#E3B341" font-size="8" text-anchor="middle" font-weight="600">${hl.label}</text>
  ` : "";

  const svg = `
    ${vTicks.map(v => `<line x1="${vX(v)}" y1="${PD.t}" x2="${vX(v)}" y2="${PD.t+GH}" stroke="#161B22" stroke-width="1"/>`).join("")}
    ${pTicks.map(p => `<line x1="${PD.l}" y1="${pY(p)}" x2="${PD.l+GW}" y2="${pY(p)}" stroke="#161B22" stroke-width="1"/>`).join("")}
    <line x1="${PD.l}" y1="${PD.t}" x2="${PD.l}" y2="${PD.t+GH}" stroke="#30363D" stroke-width="1.5"/>
    <line x1="${PD.l}" y1="${PD.t+GH}" x2="${PD.l+GW}" y2="${PD.t+GH}" stroke="#30363D" stroke-width="1.5"/>
    ${vTicks.map(v => `<text x="${vX(v)}" y="${PD.t+GH+16}" text-anchor="middle" fill="#484F58" font-size="10">${v}</text>`).join("")}
    ${pTicks.map(p => `<text x="${PD.l-8}" y="${pY(p)+4}" text-anchor="end" fill="#484F58" font-size="10">${p}</text>`).join("")}
    <text x="${PD.l+GW/2}" y="${H-4}" text-anchor="middle" fill="#6E7681" font-size="11">Volume (mL)</text>
    <text x="14" y="${PD.t+GH/2}" text-anchor="middle" fill="#6E7681" font-size="11" transform="rotate(-90,14,${PD.t+GH/2})">Pressure (mmHg)</text>
    ${refBlock}
    <polyline points="${espL}" fill="none" stroke="${col}" stroke-width="1.5" opacity="0.45" stroke-dasharray="6,3"/>
    <polyline points="${edpL}" fill="none" stroke="${col}" stroke-width="1.5" opacity="0.45" stroke-dasharray="6,3"/>
    ${espLabel}
    ${edpLabel}
    <line x1="${vX(pv.EDV)}" y1="${pY(0)}" x2="${vX(pv.ESV)}" y2="${pY(pv.ESP)}" stroke="#E3B341" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.5"/>
    <text x="${vX(pv.EDV)+4}" y="${pY(2)}" fill="#E3B341" font-size="8" opacity="0.55">Ea</text>
    <polygon points="${loop}" fill="${col}" fill-opacity="0.1" stroke="${col}" stroke-width="2.2" stroke-linejoin="round"/>
    <circle cx="${vX(pv.EDV)}" cy="${pY(pv.LVEDP)}" r="3" fill="${col}" opacity="0.7"/>
    <circle cx="${vX(pv.ESV)}" cy="${pY(pv.ESP)}" r="3" fill="${col}" opacity="0.7"/>
    <circle cx="${vX(pv.EDV)}" cy="${pY(pv.ESP)}" r="3" fill="${col}" opacity="0.4"/>
    <circle cx="${vX(pv.ESV)}" cy="${pY(pv.esvP0)}" r="3" fill="${col}" opacity="0.4"/>
    <text x="${vX(pv.EDV)+7}" y="${pY((pv.LVEDP+pv.ESP)/2)}" fill="#6E7681" font-size="9" font-weight="600">b</text>
    <text x="${vX((pv.EDV+pv.ESV)/2)}" y="${pY(pv.ESP)-7}" fill="#6E7681" font-size="9" text-anchor="middle" font-weight="600">c</text>
    <text x="${vX(pv.ESV)-8}" y="${pY((pv.ESP+pv.esvP0)/2)}" fill="#6E7681" font-size="9" text-anchor="end" font-weight="600">d</text>
    <text x="${vX((pv.EDV+pv.ESV)/2)}" y="${pY(edpvr((pv.EDV+pv.ESV)/2, pm.alpha))+15}" fill="#6E7681" font-size="9" text-anchor="middle" font-weight="600">a</text>
    <line x1="${vX(pv.ESV)}" y1="${pY(-8)}" x2="${vX(pv.EDV)}" y2="${pY(-8)}" stroke="${col}" stroke-width="1" opacity="0.5"/>
    <text x="${vX((pv.ESV+pv.EDV)/2)}" y="${pY(-16)}" fill="${col}" font-size="9" text-anchor="middle" opacity="0.65">SV = ${Math.round(pv.SV)} mL</text>
    ${hlBlock}
  `;
  document.getElementById("svgChart").innerHTML = svg;
}

function renderSliders(sc, col) {
  const defs = [
    { key:"Ees", label:"Contractility (Ees)", min:0.5, max:5, step:0.1 },
    { key:"EDV", label:"Preload (EDV)", min:60, max:220, step:2 },
    { key:"Ea", label:"Afterload (Ea)", min:0.5, max:4, step:0.1 },
    { key:"alpha", label:"Compliance (α)", min:0.005, max:0.04, step:0.001 }
  ];
  const el = document.getElementById("sliders");
  el.innerHTML = defs.map(({key,label,min,max,step:s}) => {
    const val = mode === "scenario" ? (sc[key] ?? NORM[key]) : sl[key];
    const disp = key === "alpha" ? val.toFixed(3) : Number(val).toFixed(1);
    return `
      <div>
        <div class="slider-label">${label}</div>
        <input type="range" data-key="${key}" min="${min}" max="${max}" step="${s}" value="${val}" style="accent-color:${col};">
        <div class="slider-val">${disp}</div>
      </div>
    `;
  }).join("");
  el.querySelectorAll("input[type=range]").forEach(inp => {
    inp.addEventListener("input", () => slide(inp.dataset.key, parseFloat(inp.value)));
  });
}

function renderStepsPanel(sc, col) {
  const el = document.getElementById("stepsPanel");
  const manualEl = document.getElementById("manualPanel");
  if (mode !== "scenario") { el.innerHTML = ""; renderManual(manualEl); return; }
  manualEl.innerHTML = "";
  const steps = sc.steps;
  const nSteps = steps.length;
  el.innerHTML = `
    <div class="steps-panel" style="border-color:${col}22;">
      <div class="steps-head">
        <span class="steps-title" style="color:${col};">${sc.label}${scKey !== "normal" ? " — Mechanism" : " — How It Works"}</span>
        <div class="steps-nav">
          <button id="prevBtn" class="nav-btn${step===0 ? ' disabled' : ''}"
            style="background:${step===0 ? '#0D1117' : col+'18'}; color:${step===0 ? '#30363D' : col}; border:1px solid ${step===0 ? '#21262D' : col+'44'};">← Prev</button>
          <span class="step-count">${step+1}/${nSteps}</span>
          <button id="nextBtn" class="nav-btn${step===nSteps-1 ? ' disabled' : ''}"
            style="background:${step===nSteps-1 ? '#0D1117' : col+'18'}; color:${step===nSteps-1 ? '#30363D' : col}; border:1px solid ${step===nSteps-1 ? '#21262D' : col+'44'};">Next →</button>
        </div>
      </div>
      <div class="progress-row">
        ${steps.map((_,i) => `<div class="progress-seg" data-step="${i}" style="background:${i<=step ? col : '#21262D'};"></div>`).join("")}
      </div>
      <div class="step-title">${steps[step].title}</div>
      <div class="step-text">${steps[step].text}</div>
    </div>
  `;
  document.getElementById("prevBtn").addEventListener("click", () => { if (step>0) { step--; render(); } });
  document.getElementById("nextBtn").addEventListener("click", () => { if (step<nSteps-1) { step++; render(); } });
  el.querySelectorAll("[data-step]").forEach(seg => {
    seg.addEventListener("click", () => { step = parseInt(seg.dataset.step); render(); });
  });
}

function renderManual(el) {
  el.innerHTML = `
    <div class="manual-panel">
      <strong style="color:#E6EDF3;">Manual mode — independent effects (cf025)</strong><br>
      Each slider isolates a single variable for teaching purposes. In vivo, these parameters are interdependent.<br>
      • <strong style="color:#BC8CFF;">Contractility</strong>: rotates ESPVR → left side of loop moves (ESV changes), right side stays<br>
      • <strong style="color:#1F6FEB;">Preload</strong>: slides along same ESPVR → right side moves, left side stays<br>
      • <strong style="color:#A371F7;">Afterload (ESP)</strong>: the b/c intersection → ESP rises/falls, ESV changes<br>
      • <strong style="color:#F0883E;">Compliance</strong>: rotates EDPVR → stiffer wall fills to smaller EDV at same filling pressure
    </div>
  `;
}

function render() {
  const sc = SC[scKey];
  const pv = computePV();
  const pm = mode === "scenario" ? sc : { Ees: sl.Ees, EDV: pv.EDV, Ea: sl.Ea, alpha: sl.alpha };
  const col = mode === "scenario" ? sc.color : "#58A6FF";
  const showRef = mode === "scenario" ? scKey !== "normal" : true;
  const hl = mode === "scenario" ? getHL(sc.highlight, pv) : null;

  renderGroups();
  renderSVG(pv, pm, col, showRef, hl);
  renderSliders(sc, col);
  renderStepsPanel(sc, col);
}

render();
</script>
</body>
</html>
